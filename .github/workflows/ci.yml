name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: shop
          POSTGRES_USER: shop
          POSTGRES_PASSWORD: shop
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U shop -d shop"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        run: gradle :app:test
        env:
          JDBC_DATABASE_URL: jdbc:postgresql://localhost:5432/shop
          JDBC_DATABASE_USER: shop
          JDBC_DATABASE_PASSWORD: shop
          REDIS_URL: redis://localhost:6379
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          JWT_SECRET: github-ci-secret
